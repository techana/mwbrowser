<HTML>
<HEAD><TITLE>Form Widgets</TITLE></HEAD>
<BODY>
<H2>Form widgets</H2>
<P>Text:
<INPUT type="text" name="t" value="">
</P>
<P>Pass:
<INPUT type="password" name="p" value="">
</P>
<P>Check: <INPUT type="checkbox" name="c1" checked> A <INPUT type="checkbox" name="c2"> B</P>
<P>Radio: <INPUT type="radio" name="r" value="1"> One <INPUT type="radio" name="r" value="2" checked> Two</P>
<P>Pick:
<SELECT name="s">
<OPTION>Apple</OPTION>
<OPTION>Banana</OPTION>
</SELECT>
</P>
<P>
<INPUT type="submit" name="go" value="Send">
<INPUT type="reset" value="Reset">
</P>
</BODY>
</HTML>
